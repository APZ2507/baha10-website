<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>המצוין מתחיל כאן</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;900&family=Assistant:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
/* =========================================================
   טוקנים עיצוביים — כאן קובעים צבעים, גופנים ורדיוסים כלליים
   ========================================================= */
:root{
  /* פלטת שקיעה: חול חמים ברקע, דמדומים סגולים לכותרת, כתום-אלמוג ככפתור ראשי, זהב כהדגשה */
  --bg: #F5E6D8;
  --bg-2: #EED2B8;
  --panel: #FFFAF2;
  --panel-2: #F9EADB;
  --ink: #2E2130;
  --ink-soft: #6E5B60;
  --olive: #D9603D;        /* אלמוג - צבע פעולה ראשי */
  --olive-dark: #3B2A52;   /* דמדומים סגולים - כותרות */
  --brass: #E8A33D;        /* זהב - הדגשות */
  --brass-light: #F3C77C;
  --open: #4C7A4A;
  --open-bg: #E7EEDD;
  --closed: #A23B2E;
  --closed-bg: #F5E1D9;
  --steel: #6B4C7A;        /*הסגול-מעושן לפרטי קשר*/
  --steel-bg: #EAE1F0;
  --sunset-grad: linear-gradient(180deg, #EE9257 0%, #F5C89A 55%, #FBEFE1 100%); /* אומברה כתום-לבן עדינה - כותרת + קו 10 */
  --on-sunset-ink: #4A2E1D;  /* טקסט כהה קריא על גבי האומברה הבהירה */
  --on-sunset-soft: #7C5B44;
  --radius: 14px;
  --shadow: 0 2px 0 rgba(46,33,48,0.07), 0 10px 24px -14px rgba(46,33,48,0.4);
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    radial-gradient(1200px 500px at 15% -10%, #FCEBDB 0%, transparent 60%),
    linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
  color:var(--ink);
  font-family:'Assistant', sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}

h1,h2,h3,.display{
  font-family:'Heebo', sans-serif;
  font-weight:900;
  letter-spacing:0.5px;
  color:var(--olive-dark);
  margin:0;
}

.mono{font-family:'JetBrains Mono', monospace; letter-spacing:0.5px;}

a{color:inherit; text-decoration:none;}

::selection{background:var(--brass-light); color:var(--olive-dark);}

/* focus visibility */
a:focus-visible, button:focus-visible, input:focus-visible{
  outline:3px solid var(--brass);
  outline-offset:2px;
}

/* =========================================================
   באנר שער (תמונת רקע) - לא דביק, גולל עם העמוד
   ========================================================= */
.hero-banner{
  width:100%;
  height:260px;
  background: url('header-background.png') center 35% / cover no-repeat;
  position:relative;
}
.hero-banner::after{
  content:'';
  position:absolute; inset:0;
  background:linear-gradient(180deg, rgba(0,0,0,0) 55%, var(--bg) 100%);
}
@media (max-width:640px){
  .hero-banner{ height:150px; }
}

/* =========================================================
   HEADER
   ========================================================= */
header.site-head{
  position:sticky; top:0; z-index:50;
  background:var(--sunset-grad);
  color:var(--on-sunset-ink);
  padding:18px 20px 16px;
  box-shadow:0 8px 20px -12px rgba(74,46,29,0.3);
}
.head-row{
  max-width:1100px; margin:0 auto;
  display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap;
}
.brand{display:flex; align-items:center; gap:12px;}
.brand .badge{
  width:46px; height:46px; border-radius:10px;
  background:var(--olive-dark);
  display:flex; align-items:center; justify-content:center;
  font-size:22px; color:#FBEFE1; font-weight:900;
  box-shadow:inset 0 0 0 2px rgba(255,255,255,0.25);
  flex-shrink:0;
}
.brand-text h1{color:var(--on-sunset-ink); font-size:22px;}
.brand-text .sub{font-size:12.5px; color:var(--on-sunset-soft); margin-top:2px; letter-spacing:0.4px;}

.clock{
  text-align:left; direction:ltr;
  background:rgba(255,255,255,0.5);
  border:1px solid rgba(74,46,29,0.15);
  border-radius:10px;
  padding:6px 14px;
  min-width:150px;
}
.clock .time{font-size:20px; font-weight:700; font-family:'JetBrains Mono',monospace; color:var(--on-sunset-ink);}
.clock .day{font-size:11.5px; color:var(--on-sunset-soft); text-align:right; direction:rtl; letter-spacing:0.5px;}

/* search */
.search-wrap{max-width:1100px; margin:14px auto 0; position:relative;}
.search-box{
  display:flex; align-items:center; gap:10px;
  background:#F8F5EA; border-radius:12px;
  padding:10px 14px;
  box-shadow: var(--shadow);
}
.search-box svg{flex-shrink:0; opacity:0.55;}
.search-box input{
  flex:1; border:none; background:transparent; outline:none;
  font-family:'Assistant',sans-serif; font-size:16px; color:var(--ink);
  padding:4px 0;
}
.search-box input::placeholder{color:#9a9683;}
.search-results{
  position:absolute; top:calc(100% + 6px); right:0; left:0;
  background:var(--panel); border-radius:12px; overflow:hidden;
  box-shadow:var(--shadow); z-index:60; display:none;
}
.search-results.show{display:block;}
.search-results button{
  display:flex; align-items:center; gap:10px; width:100%;
  padding:10px 14px; background:none; border:none; cursor:pointer;
  font-family:'Assistant',sans-serif; font-size:15px; color:var(--ink);
  border-bottom:1px solid var(--panel-2); text-align:right;
}
.search-results button:hover{background:var(--panel-2);}
.search-results .empty{padding:12px 14px; color:var(--ink-soft); font-size:14px;}

/* =========================================================
   ניווט קטגוריות
   ========================================================= */
nav.cats{
  position:sticky; top:96px; z-index:40;
  background:var(--bg);
  padding:12px 20px;
  border-bottom:1px solid rgba(72,87,59,0.15);
}
.data-error-banner{
  background:var(--closed-bg); border-bottom:1px solid rgba(162,59,46,0.25);
  padding:12px 20px;
}
.data-error-inner{
  max-width:1100px; margin:0 auto;
  display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap;
  color:var(--closed); font-size:13.5px; font-weight:600;
}
.data-error-inner button{
  background:var(--closed); color:#fff; border:none; border-radius:8px;
  padding:8px 16px; font-family:'Assistant',sans-serif; font-weight:700; font-size:13px; cursor:pointer; flex-shrink:0;
}
.data-error-inner button:hover{opacity:0.9;}
.cats-row{
  max-width:1100px; margin:0 auto;
  display:flex; gap:10px; overflow-x:auto; padding-bottom:2px;
  scrollbar-width:thin;
}
.cat-btn{
  flex-shrink:0;
  display:flex; align-items:center; gap:8px;
  padding:9px 18px 9px 14px;
  background:var(--panel);
  border:1px solid rgba(72,87,59,0.2);
  color:var(--olive-dark);
  font-family:'Heebo',sans-serif; font-weight:700; font-size:14.5px;
  cursor:pointer;
  clip-path: polygon(10px 0, 100% 0, 100% 100%, 0 100%, 0 10px);
  transition:background .15s, color .15s, transform .1s;
}
.cat-btn:hover{transform:translateY(-1px);}
.cat-btn.active{
  background:linear-gradient(120deg, var(--olive), var(--brass)); color:#FFF9F1; border-color:var(--olive);
}
.cat-btn .n{
  font-family:'JetBrains Mono',monospace; font-size:11.5px;
  background:rgba(0,0,0,0.12); padding:1px 7px; border-radius:20px;
}
.cat-btn.active .n{background:rgba(255,255,255,0.2);}

/* =========================================================
   מבנה כללי
   ========================================================= */
main{max-width:1100px; margin:0 auto; padding:28px 20px 60px;}
section.block{margin-bottom:44px;}
.block-title{
  display:flex; align-items:center; gap:14px; margin-bottom:18px; flex-wrap:wrap;
}
.block-title h2{font-size:21px; color:var(--olive-dark);}
.block-title h2:empty{display:none;}
.block-title .eyebrow{
  display:inline-flex; align-items:center; gap:6px;
  font-family:'Heebo', sans-serif; font-weight:800; font-size:14px;
  letter-spacing:0.3px; color:#FFFBF3;
  background:linear-gradient(120deg, var(--olive), var(--brass));
  padding:7px 18px;
  border-radius:22px;
  box-shadow:var(--shadow);
}

.grid{
  display:grid; grid-template-columns:repeat(auto-fill, minmax(300px,1fr));
  gap:16px;
}

/* =========================================================
   כרטיס שירות
   ========================================================= */
.card{
  background:var(--panel);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:18px 18px 16px;
  position:relative;
  border-top:3px solid var(--olive);
  scroll-margin-top:170px;
  transition: box-shadow .25s, transform .25s;
}
.card.flash{
  animation:flashHighlight 1.6s ease;
}
@keyframes flashHighlight{
  0%{box-shadow:0 0 0 3px var(--brass-light), var(--shadow);}
  100%{box-shadow:var(--shadow);}
}
.card-top{display:flex; align-items:flex-start; justify-content:space-between; gap:10px;}
.card-id{display:flex; align-items:center; gap:10px;}
.icon-badge{
  width:42px; height:42px; border-radius:10px;
  background:var(--panel-2);
  display:flex; align-items:center; justify-content:center;
  font-size:20px;
  flex-shrink:0;
}
.card-id h3{font-size:16.5px; color:var(--ink);}
.card-id .cat-tag{font-size:11px; color:var(--ink-soft); letter-spacing:0.3px;}

.stamp{
  font-family:'Heebo',sans-serif; font-weight:900; font-size:11.5px;
  letter-spacing:1px;
  padding:5px 10px;
  border-radius:7px;
  border:1.5px dashed currentColor;
  transform:rotate(-3deg);
  white-space:nowrap;
}
.stamp.open{color:var(--open); background:var(--open-bg);}
.stamp.closed{color:var(--closed); background:var(--closed-bg);}

.card .status-line{
  margin-top:10px; font-size:13px; color:var(--ink-soft);
}
.card .status-line b{color:var(--ink); font-weight:700;}

.hours-table{
  width:100%; margin-top:14px; border-collapse:collapse; font-size:13px;
}
.hours-table tr{border-bottom:1px solid var(--panel-2);}
.hours-table tr:last-child{border-bottom:none;}
.hours-table td{padding:5px 2px; vertical-align:top;}
.hours-table td.day-name{width:58px; color:var(--ink-soft); font-weight:600;}
.hours-table tr.today td.day-name{color:var(--olive); font-weight:800;}
.hours-table tr.today{background:var(--panel-2); border-radius:6px;}
.hours-table .win-list{display:flex; flex-direction:column; gap:2px;}
.hours-table .win{font-family:'JetBrains Mono',monospace; font-size:12.5px;}
.hours-table .win .lbl{font-family:'Assistant',sans-serif; color:var(--ink-soft); font-size:11.5px; margin-inline-start:5px;}
.hours-table .closed-txt{color:var(--closed); font-size:12.5px;}

/* =========================================================
   כרטיס קו 10
   ========================================================= */
.bus-card{
  background:var(--sunset-grad);
  color:var(--on-sunset-ink);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:22px;
  scroll-margin-top:170px;
}
.bus-card .card-top h3{color:var(--on-sunset-ink); font-size:19px;}
.bus-card .card-id .cat-tag{color:var(--on-sunset-soft);}
.bus-card .icon-badge{background:rgba(255,255,255,0.6); color:var(--on-sunset-ink);}
.bus-next{display:flex; gap:12px; margin-top:16px; flex-wrap:wrap;}
.bus-chip{
  background:rgba(255,255,255,0.55);
  border:1px solid rgba(74,46,29,0.15);
  border-radius:10px;
  padding:12px 16px;
  min-width:140px;
  flex:1;
}
.bus-chip .route{font-family:'Heebo',sans-serif; font-weight:800; font-size:13px; color:var(--olive);}
.bus-chip .time{font-family:'JetBrains Mono',monospace; font-size:24px; font-weight:700; margin-top:2px; color:var(--on-sunset-ink);}
.bus-chip .countdown{font-size:12px; color:var(--on-sunset-soft); margin-top:3px;}
.bus-empty{
  margin-top:16px; padding:14px 16px; border-radius:10px;
  background:rgba(255,255,255,0.55); font-size:14px; color:var(--on-sunset-ink);
}
.bus-toggle{
  margin-top:16px; background:none; border:1px solid rgba(74,46,29,0.3);
  color:var(--on-sunset-ink); padding:8px 16px; border-radius:8px; cursor:pointer;
  font-family:'Assistant',sans-serif; font-size:13.5px; font-weight:600;
}
.bus-toggle:hover{background:rgba(255,255,255,0.35);}
.bus-full{display:none; margin-top:16px;}
.bus-full.show{display:block;}
.bus-route-block{margin-bottom:14px;}
.bus-route-block h4{font-family:'Heebo',sans-serif; font-size:14px; color:var(--olive); margin-bottom:6px;}
.bus-route-block .stops{font-size:12.5px; color:var(--on-sunset-soft); line-height:1.7;}
.bus-route-block .times{
  display:flex; flex-wrap:wrap; gap:6px; margin-top:8px;
}
.bus-route-block .t{
  font-family:'JetBrains Mono',monospace; font-size:12px;
  background:rgba(255,255,255,0.55); padding:3px 8px; border-radius:6px; color:var(--on-sunset-ink);
}
.bus-note{margin-top:14px; font-size:12px; color:var(--on-sunset-soft); line-height:1.6;}

/* =========================================================
   תהליך קליטה
   ========================================================= */
.timeline{
  display:flex; flex-direction:column; gap:0;
  counter-reset:step;
}
.tl-step{
  display:flex; gap:16px; position:relative; padding-bottom:26px;
}
.tl-step:last-child{padding-bottom:0;}
.tl-step:not(:last-child)::before{
  content:''; position:absolute; right:19px; top:40px; bottom:0;
  width:2px; background:repeating-linear-gradient(180deg, var(--brass) 0 6px, transparent 6px 12px);
}
.tl-num{
  counter-increment:step;
  width:40px; height:40px; border-radius:50%;
  background:var(--olive); color:#F3EEDF;
  display:flex; align-items:center; justify-content:center;
  font-family:'JetBrains Mono',monospace; font-weight:700; font-size:15px;
  flex-shrink:0; z-index:1;
}
.tl-num::before{content: counter(step);}
.tl-body{
  background:var(--panel); border-radius:12px; padding:14px 16px;
  box-shadow:var(--shadow); flex:1;
}
.tl-body h4{font-family:'Heebo',sans-serif; font-size:15.5px; color:var(--ink); margin-bottom:4px;}
.tl-body p{margin:0; font-size:13.5px; color:var(--ink-soft); line-height:1.6;}

/* =========================================================
   טלפונים חשובים
   ========================================================= */
.phones-grid{
  display:grid; grid-template-columns:repeat(auto-fill, minmax(230px,1fr));
  gap:12px;
}
.phone-card{
  display:flex; align-items:center; justify-content:space-between;
  background:var(--panel); border-radius:12px; padding:14px 16px;
  box-shadow:var(--shadow);
  border-inline-start:4px solid var(--steel);
}
.phone-card .name{font-weight:700; font-size:14.5px; color:var(--ink);}
.phone-card .role{font-size:12px; color:var(--ink-soft); margin-top:2px;}
.phone-card a.dial{
  display:flex; align-items:center; gap:8px;
  background:var(--steel-bg); color:var(--steel);
  padding:8px 14px; border-radius:9px; font-family:'JetBrains Mono',monospace;
  font-weight:700; font-size:14.5px; direction:ltr;
}
.phone-card a.dial:hover{background:var(--steel); color:#fff;}

/* =========================================================
   סרטוני הדרכה - כפתור קומפקטי שפותח נגן במסך מלא (מודל)
   ========================================================= */
.video-section{margin-top:14px;}
.video-placeholder{
  border:1.5px dashed rgba(72,87,59,0.3);
  border-radius:10px; padding:16px; text-align:center;
  font-size:13px; color:var(--ink-soft); background:var(--panel-2);
}
.video-trigger{
  display:flex; align-items:center; gap:10px; width:100%;
  background:var(--panel-2); border:1px solid rgba(72,87,59,0.18);
  border-radius:10px; padding:11px 14px; cursor:pointer;
  font-family:'Assistant',sans-serif; font-size:13.5px; font-weight:600; color:var(--ink);
  text-align:right; transition:background .15s;
}
.video-trigger:hover{background:var(--panel);}
.video-trigger .vt-icon{
  flex-shrink:0; width:30px; height:30px; border-radius:50%;
  background:var(--olive); color:#fff; display:flex; align-items:center; justify-content:center;
  font-size:12px;
}

/* מודל וידאו במסך מלא */
.video-modal{
  position:fixed; inset:0; z-index:200;
  background:rgba(24,16,12,0.88);
  display:none; align-items:center; justify-content:center; padding:20px;
}
.video-modal.show{display:flex;}
.video-modal-inner{
  background:var(--panel); border-radius:14px; padding:18px;
  max-width:900px; width:100%; position:relative;
  box-shadow:0 20px 60px -20px rgba(0,0,0,0.6);
}
.video-modal-close{
  position:absolute; top:-14px; left:-14px;
  width:34px; height:34px; border-radius:50%;
  background:var(--olive-dark); color:#fff; border:2px solid var(--panel);
  font-size:15px; cursor:pointer; display:flex; align-items:center; justify-content:center;
}
.video-modal-caption{font-family:'Heebo',sans-serif; font-weight:800; font-size:15px; color:var(--olive-dark); margin-bottom:12px;}
.video-embed-wrap{position:relative; width:100%; padding-top:56.25%; border-radius:10px; overflow:hidden;}
.video-embed-wrap iframe{position:absolute; inset:0; width:100%; height:100%; border:0;}
.info-video{width:100%; border-radius:10px; display:block; max-height:75vh;}

/* =========================================================
   קישור חיצוני (לדוגמה הזמנת כרטיס אגד)
   ========================================================= */
.external-link{
  display:inline-flex; align-items:center; gap:6px; margin-top:14px;
  background:var(--olive); color:#FFF9F1; font-weight:700; font-size:13.5px;
  padding:9px 18px; border-radius:9px;
}
.external-link:hover{background:var(--olive-dark);}
.app-links-row{display:flex; flex-wrap:wrap; gap:10px;}
.app-links-row .external-link{margin-top:14px;}

/* =========================================================
   בועת ווטסאפ - הצטרפות לקבוצה
   ========================================================= */
.wa-bubble{
  display:inline-flex; align-items:center; gap:8px; margin-top:12px;
  background:#DCF8C6; color:#1F2C17;
  padding:10px 16px; border-radius:16px 16px 16px 4px;
  font-size:13.5px; font-weight:600;
  box-shadow:0 1px 0 rgba(0,0,0,0.08);
}
.wa-bubble:hover{background:#CDEFB0;}
.wa-bubble .wa-icon{font-size:16px;}

/* =========================================================
   שאטלים
   ========================================================= */
.shuttle-list{display:flex; flex-direction:column; gap:10px; margin-top:14px;}
.shuttle-row{
  display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px;
  background:var(--panel-2); border-radius:10px; padding:12px 14px;
}
.shuttle-route{font-weight:700; font-size:14px; color:var(--ink);}
.shuttle-days{font-size:12px; color:var(--ink-soft); margin-top:2px;}
.shuttle-row .wa-bubble{margin-top:0;}

/* =========================================================
   דגשים ונהלים
   ========================================================= */
.guidelines-list{display:flex; flex-direction:column; gap:12px;}
.guideline-block{
  background:var(--panel); border-radius:12px; padding:6px 18px;
  box-shadow:var(--shadow); border-inline-start:4px solid var(--olive);
}
.guideline-block summary{
  cursor:pointer; padding:12px 0; font-family:'Heebo',sans-serif; font-weight:800;
  font-size:15.5px; color:var(--olive-dark); list-style:none;
  display:flex; align-items:center; justify-content:space-between;
}
.guideline-block summary::-webkit-details-marker{display:none;}
.guideline-block summary::after{content:'˅'; font-size:16px; color:var(--brass);}
.guideline-block[open] summary::after{content:'˄';}
.guideline-block ul{margin:0 0 14px; padding-inline-start:20px; display:flex; flex-direction:column; gap:6px;}
.guideline-block li{font-size:13.5px; color:var(--ink-soft); line-height:1.6;}

/* =========================================================
   הערת עריכה למפתח (מוסתרת מהמשתמש בפועל - רק הערה למי שעורך קוד)
   ========================================================= */
.dev-note{
  max-width:1100px; margin:0 auto 20px; padding:12px 20px;
  font-size:12px; color:var(--ink-soft); text-align:center;
}

footer{
  text-align:center; padding:24px 20px 40px; font-size:12px; color:var(--ink-soft);
}

@media (max-width:640px){
  nav.cats{top:132px;}
  .clock{min-width:auto;}

<script>
/* =========================================================================================
   ============================   CONFIG   ==================================================
   =========================================================================================
   כל התוכן (שירותים, שעות, טלפונים, קו 10, נהלים וכו') חי אך ורק ב-data.json הסמוך לקובץ הזה.
   הקבועים כאן הם רק מבנה קבוע של האתר (קטגוריות, שמות ימים) - לא תוכן לעריכה שוטפת.
   לעריכת תוכן - ראו README.md ואת data.json עצמו (יש בו הסבר _instructions בתחילתו).
   ========================================================================================= */

const DAY_NAMES = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
const DAY_SHORT = ['א','ב','ג','ד','ה','ו','ש'];

const CATEGORIES = [
  { id:'health',      name:'בריאות',          icon:'⚕' },
  { id:'food',        name:'אוכל',            icon:'🍽' },
  { id:'logistics',   name:'לוגיסטיקה',       icon:'📦' },
  { id:'sport',       name:'ספורט ופנאי',     icon:'🏊' },
  { id:'transport',   name:'תחבורה',          icon:'🚌' },
  { id:'prayers',     name:'תפילות',          icon:'🕍' },
  { id:'guidelines',  name:'נהלים',           icon:'📋' },
  { id:'onboarding',  name:'קליטה',           icon:'🧭' },
];

function getBusDeparturesForDay(dayIndex){
  if (dayIndex === 5 || dayIndex === 6) return []; // שישי/שבת - אין קו 10
  const lastHour = dayIndex === 4 ? LIVE_BUS_HOURS.lastHourThursday : LIVE_BUS_HOURS.lastHourNormal;
  const out = [];
  for (let h = LIVE_BUS_HOURS.firstHour; h <= lastHour; h++){
    LIVE_BUS_ROUTES.forEach(r => out.push({ hour:h, minute:r.minuteOffset, route:r }));
  }
  out.sort((a,b)=> (a.hour*60+a.minute) - (b.hour*60+b.minute));
  return out;
}

/* =========================================================================================
   שכבת נתונים חיה - האתר קורא את כל התוכן מ-data.json בכל טעינת עמוד. זהו מקור האמת היחיד.
   אם data.json לא נטען בהצלחה (רשת, קובץ חסר, שגיאת תחביר) - מוצגת הודעה ידידותית במקום
   מסך ריק או תוכן ישן/כפול.
   ========================================================================================= */
let LIVE_SERVICES = [];
let LIVE_PHONES = [];
let LIVE_BUS_ROUTES = [];
let LIVE_BUS_HOURS = {};
let LIVE_TRANSPORT_INFO = {};
let LIVE_SHUTTLES = [];
let LIVE_SHUTTLE_APPS = {};
let LIVE_GUIDELINES = [];
let LIVE_ABSORPTION_STEPS = [];
let DATA_LOAD_FAILED = false;

async function loadRemoteData(){
  const res = await fetch('data.json', { cache: 'no-store' }); // זורק שגיאה אם אין רשת - נתפס למעלה ב-init
  if (!res.ok) throw new Error('data.json not found (' + res.status + ')');
  return await res.json();
}

// ---------- פענוח פורמט קומפקטי מ-data.json ----------
// שעות מגיעות כמחרוזת קריאה לבני אדם כמו "08:00-16:00, 18:00-20:00 (תגית)" - הופכים למבנה הפנימי {start,end,label?}
function parseHoursDay(text){
  if (!text || !text.trim()) return [];
  return text.split(',').map(seg=>seg.trim()).filter(Boolean).map(seg=>{
    const m = seg.match(/^(\d{1,2}:\d{2})\s*-\s*(\d{1,2}:\d{2})(?:\s*\(([^)]+)\))?$/);
    if (!m) return null;
    const norm = t => t.split(':').map((x,i)=> i===0 ? x.padStart(2,'0') : x).join(':');
    const win = { start: norm(m[1]), end: norm(m[2]) };
    if (m[3]) win.label = m[3].trim();
    return win;
  }).filter(Boolean);
}
function parseServiceFromRemote(id, s){
  const hours = {};
  for (let d=0; d<7; d++){
    hours[d] = parseHoursDay(s.hours ? s.hours[String(d)] : '');
  }
  return {
    id, name:s.name, category:s.category, icon:s.icon, hours,
    note: s.note||'', videoUrl: s.videoUrl||'', videoCaption: s.videoCaption||'',
    waGroupUrl: s.waGroupUrl||'', waGroupLabel: s.waGroupLabel||''
  };
}
// תחנות מגיעות כמחרוזת אחת "תחנה א ← תחנה ב ← תחנה ג" - הופכים למערך תחנות
function parseBusRouteFromRemote(r){
  const stops = typeof r.stops === 'string'
    ? r.stops.split('←').map(x=>x.trim()).filter(Boolean)
    : (r.stops || []);
  return { id:r.id, name:r.name, minuteOffset:r.minuteOffset, stops };
}

function rebuildLiveData(remote){
  LIVE_SERVICES = Object.entries(remote.services || {})
    .filter(([id]) => !id.startsWith('_')) // מתעלמים מכל מפתח שמתחיל ב-_ (כמו _instructions)
    .map(([id, s]) => parseServiceFromRemote(id, s));
  LIVE_PHONES         = remote.phones || [];
  LIVE_BUS_ROUTES      = (remote.busRoutes || []).map(parseBusRouteFromRemote);
  LIVE_BUS_HOURS        = remote.busHours || { firstHour:8, lastHourNormal:19, lastHourThursday:17 };
  LIVE_TRANSPORT_INFO   = remote.transportInfo || { title:'', body:[], videoUrl:'', videoCaption:'', linkLabel:'', linkUrl:'' };
  LIVE_SHUTTLES         = remote.shuttles || [];
  LIVE_SHUTTLE_APPS     = remote.shuttleApps || { appStoreUrl:'', googlePlayUrl:'' };
  LIVE_GUIDELINES       = remote.guidelines || [];
  LIVE_ABSORPTION_STEPS = remote.absorptionSteps || [];
}

// ---------- עזרים כלליים ----------
function pad(n){ return String(n).padStart(2,'0'); }
function toMinutes(hhmm){ const [h,m] = hhmm.split(':').map(Number); return h*60+m; }
function fmtMinutes(total){
  const h = Math.floor(total/60), m = total%60;
  return `${pad(h)}:${pad(m)}`;
}
function getStatus(service, date){
  const day = date.getDay();
  const nowMin = date.getHours()*60 + date.getMinutes();
  const windows = service.hours[day] || [];
  for (const w of windows){
    const s = toMinutes(w.start), e = toMinutes(w.end);
    if (nowMin >= s && nowMin < e){
      return { open:true, window:w, closesIn: e - nowMin };
    }
  }
  // סגור כרגע - חפשו את הפתיחה הבאה היום
  const upcomingToday = windows
    .map(w => ({ w, s: toMinutes(w.start) }))
    .filter(x => x.s > nowMin)
    .sort((a,b)=>a.s-b.s)[0];
  if (upcomingToday){
    return { open:false, opensIn: upcomingToday.s - nowMin, opensAt: upcomingToday.w.start, opensDay: DAY_NAMES[day] };
  }
  // חפשו קדימה בימים הבאים
  for (let i=1;i<=7;i++){
    const d = (day+i) % 7;
    const win = (service.hours[d] || [])[0];
    if (win){
      return { open:false, opensAt: win.start, opensDay: DAY_NAMES[d] };
    }
  }
  return { open:false };
}

function renderHoursTable(service, todayIdx){
  let rows = '';
  for (let d=0; d<7; d++){
    const windows = service.hours[d] || [];
    const isToday = d === todayIdx;
    let cell;
    if (windows.length === 0){
      cell = `<span class="closed-txt">סגור</span>`;
    } else {
      cell = `<div class="win-list">` + windows.map(w =>
        `<span class="win">${w.start}–${w.end}${w.label ? `<span class="lbl">${w.label}</span>`:''}</span>`
      ).join('') + `</div>`;
    }
    rows += `<tr class="${isToday?'today':''}"><td class="day-name">${DAY_SHORT[d]}׳</td><td>${cell}</td></tr>`;
  }
  return `<table class="hours-table"><tbody>${rows}</tbody></table>`;
}

// עזר כללי להטמעת סרטון הדרכה (בכרטיסי שירות ובעלון המידע של תחבורה)
// רישום סרטונים לפי מזהה, כדי להימנע מבעיות ציטוט כשה-URL מכיל תווים מיוחדים
const VIDEO_REGISTRY = {};
let videoRegistryCounter = 0;

function renderVideoBlock(videoUrl, caption){
  if (!videoUrl){
    return ''
  }
  const key = `v${videoRegistryCounter++}`;
  VIDEO_REGISTRY[key] = { url: videoUrl, caption: caption || '' };
  return `
  <button class="video-trigger" data-video-key="${key}">
    <span class="vt-icon">▶</span>
    <span>${caption || 'צפו בסרטון ההדרכה'}</span>
  </button>`;
}

function openVideoModal(key){
  const item = VIDEO_REGISTRY[key];
  if (!item) return;
  const isLocalFile = /\.(mp4|webm|ogg)(\?.*)?$/i.test(item.url);
  const media = isLocalFile
    ? `<video class="info-video" controls autoplay src="${item.url}"></video>`
    : `<div class="video-embed-wrap"><iframe src="${item.url}" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe></div>`;
  document.getElementById('videoModalCaption').textContent = item.caption;
  document.getElementById('videoModalMedia').innerHTML = media;
  document.getElementById('videoModal').classList.add('show');
}

function closeVideoModal(){
  document.getElementById('videoModal').classList.remove('show');
  document.getElementById('videoModalMedia').innerHTML = ''; // עוצר ניגון בעת סגירה
  document.getElementById('videoModalCaption').textContent = '';
}

// עזר כללי לכפתור הצטרפות לקבוצת ווטסאפ, בעיצוב שנראה כמו הודעה
function renderWaBubble(url, label){
  if (!url) return '';
  return `
  <a class="wa-bubble" href="${url}" target="_blank" rel="noopener">
    <span class="wa-icon">💬</span>
    <span class="wa-text">${label || 'הצטרפות לקבוצת הווטסאפ'}</span>
  </a>`;
}

function renderServiceCard(service, date){
  const status = getStatus(service, date);
  const todayIdx = date.getDay();
  let statusLine = '';
  if (status.open){
    statusLine = `${status.window.label ? status.window.label+' · ' : ''}נסגר בעוד <b>${status.closesIn} דק׳</b>`;
  } else if (status.opensAt){
    statusLine = status.opensDay ? `נפתח ביום ${status.opensDay} בשעה <b>${status.opensAt}</b>` : `נפתח היום בשעה <b>${status.opensAt}</b>`;
  } else {
    statusLine = 'אין שעות פעילות מוגדרות';
  }

  return `
  <div class="card" id="svc-${service.id}" data-cat="${service.category}" data-name="${service.name}">
    <div class="card-top">
      <div class="card-id">
        <div class="icon-badge">${service.icon}</div>
        <div>
          <h3>${service.name}</h3>
          <div class="cat-tag">${CATEGORIES.find(c=>c.id===service.category).name}</div>
        </div>
      </div>
      <div class="stamp ${status.open?'open':'closed'}">${status.open?'פתוח':'סגור'}</div>
    </div>
    <div class="status-line">${statusLine}</div>
    ${service.note ? `<div class="status-line">${service.note}</div>` : ''}
    ${renderHoursTable(service, todayIdx)}
    ${service.videoUrl !== undefined ? `<div class="video-section">${renderVideoBlock(service.videoUrl, service.videoCaption)}</div>` : ''}
    ${service.waGroupUrl ? renderWaBubble(service.waGroupUrl, service.waGroupLabel) : ''}
  </div>`;
}

function renderBusCard(date){
  const day = date.getDay();
  const nowMin = date.getHours()*60 + date.getMinutes();
  const all = getBusDeparturesForDay(day);
  const upcoming = all.filter(d => (d.hour*60+d.minute) >= nowMin).slice(0,3);

  let nextHtml;
  if (day === 5 || day === 6){
    nextHtml = `<div class="bus-empty">אין קו 10 בימי שישי ושבת. הקו הראשון ביום ראשון יוצא ב־08:00.</div>`;
  } else if (upcoming.length === 0){
    nextHtml = `<div class="bus-empty">אין עוד הסעות של קו 10 היום. הקו הראשון מחר יוצא ב־08:00${day===3? ' (יום חמישי — הקו פועל עד 18:00 בלבד)':''}.</div>`;
  } else {
    nextHtml = `<div class="bus-next">` + upcoming.map(d=>{
      const depMin = d.hour*60+d.minute;
      const inMin = depMin - nowMin;
      return `<div class="bus-chip">
        <div class="route">${d.route.name}</div>
        <div class="time mono">${pad(d.hour)}:${pad(d.minute)}</div>
        <div class="countdown">יוצא בעוד ${inMin} דק׳</div>
      </div>`;
    }).join('') + `</div>`;
  }

  const fullRoutes = LIVE_BUS_ROUTES.map(r=>{
    const times = all.filter(d=>d.route.id===r.id).map(d=>`<span class="t">${pad(d.hour)}:${pad(d.minute)}</span>`).join('');
    return `<div class="bus-route-block">
      <h4>${r.name}</h4>
      <div class="stops">${r.stops.join(' ← ')}</div>
      <div class="times">${times || '<span class="t">אין הסעות היום</span>'}</div>
    </div>`;
  }).join('');

  return `
  <div class="bus-card" id="svc-bus10" data-cat="transport" data-name="קו 10">
    <div class="card-top">
      <div class="card-id">
        <div class="icon-badge">🚌</div>
        <div>
          <h3>קו 10 — תחבורה בבסיס</h3>
          <div class="cat-tag">שלוש הסעות בשעה, יציאה מרחבת ההיסעים</div>
        </div>
      </div>
    </div>
    ${nextHtml}
    <button class="bus-toggle" id="busToggle">הצג לוח זמנים מלא ליום זה ▾</button>
    <div class="bus-full" id="busFull">${fullRoutes}</div>
    <div class="bus-note">כל השעות המצוינות הן שעת היציאה מרחבת ההיסעים. ביום חמישי הקו פועל עד השעה ${pad(LIVE_BUS_HOURS.lastHourThursday)}:40 בלבד. בימי שישי ושבת אין קו 10.</div>
  </div>`;
}

function renderTransportInfoCard(){
  const info = LIVE_TRANSPORT_INFO;
  return `
  <div class="card info-card" id="svc-transport-info" data-cat="transport" data-name="${info.title}">
    <div class="card-top">
      <div class="card-id">
        <div class="icon-badge">🚍</div>
        <div>
          <h3>${info.title}</h3>
          <div class="cat-tag">עדכני, ניתן לעריכה</div>
        </div>
      </div>
    </div>
    ${info.body.map(p => `<div class="status-line">${p}</div>`).join('')}
    <div class="video-section">${renderVideoBlock(info.videoUrl, info.videoCaption)}</div>
    ${info.linkUrl ? `<a class="external-link" href="${info.linkUrl}" target="_blank" rel="noopener">${info.linkLabel} ↗</a>` : ''}
  </div>`;
}

function renderShuttlesCard(){
  const rows = LIVE_SHUTTLES.map(s => `
    <div class="shuttle-row">
      <div class="shuttle-info">
        <div class="shuttle-route">${s.route}</div>
        <div class="shuttle-days">ימי פעילות: ${s.days}</div>
      </div>
      ${renderWaBubble(s.whatsapp, 'הצטרפות לקבוצה')}
    </div>
  `).join('');

  const appButtons = [
    LIVE_SHUTTLE_APPS.appStoreUrl ? `<a class="external-link" href="${LIVE_SHUTTLE_APPS.appStoreUrl}" target="_blank" rel="noopener"> הורדת אפליקציית שאטל מ App Store ↗</a>` : '',
    LIVE_SHUTTLE_APPS.googlePlayUrl ? `<a class="external-link" href="${LIVE_SHUTTLE_APPS.googlePlayUrl}" target="_blank" rel="noopener"> הורדת אפליקציית שאטל מ Google Play ↗</a>` : ''
  ].join('');

  const appSection = appButtons
    ? `<div class="app-links-row">${appButtons}</div>`
    : `<div class="video-placeholder">📲 כאן יופיעו קישורים להתחברות לאפליקציית השאטל — עדכנו ב-data.json</div>`;

  return `
  <div class="card info-card" id="svc-shuttles" data-cat="transport" data-name="שאטלים">
    <div class="card-top">
      <div class="card-id">
        <div class="icon-badge">🚐</div>
        <div>
          <h3>שאטלים מהבסיס ואליו</h3>
          <div class="cat-tag">הצטרפו לקבוצת הווטסאפ המתאימה למסלול שלכם</div>
        </div>
      </div>
    </div>
    <div class="shuttle-list">${rows}</div>
    ${appSection}
  </div>`;
}

function renderTimeline(){
  return LIVE_ABSORPTION_STEPS.map(s => `
    <div class="tl-step">
      <div class="tl-num"></div>
      <div class="tl-body">
        <h4>${s.title}</h4>
        <p>${s.desc}</p>
      </div>
    </div>
  `).join('');
}

function renderPhones(){
  return LIVE_PHONES.map(p => `
    <div class="phone-card">
      <div>
        <div class="name">${p.name}</div>
        <div class="role">${p.role}</div>
      </div>
      <a class="dial" href="tel:${p.number}">📞 ${p.number}</a>
    </div>
  `).join('');
}

function renderGuidelines(){
  return LIVE_GUIDELINES.map((g, i) => `
    <details class="guideline-block" ${i===0 ? 'open' : ''}>
      <summary>${g.title}</summary>
      <ul>${g.points.map(p => `<li>${p}</li>`).join('')}</ul>
    </details>
  `).join('');
}

// ---------- ניווט קטגוריות ----------
let activeCat = 'all';

function renderCats(){
  const counts = {};
  LIVE_SERVICES.forEach(s => counts[s.category] = (counts[s.category]||0)+1);
  const transportCount = 1 + LIVE_SHUTTLES.length + 1; // קו 10 + שאטלים + עלון מידע
  const onboardingCount = LIVE_ABSORPTION_STEPS.length; // תהליך קליטה - רובריקה נפרדת, לא נספרת תחת "הכל"
  const guidelinesCount = LIVE_GUIDELINES.length; // דגשים ונהלים - רובריקה נפרדת, לא נספרת תחת "הכל"

  const items = [
    { id:'all', name:'כל השירותים', icon:'🗂', count: LIVE_SERVICES.length + 1 }, // שירותים + קו 10 בלבד
    { id:'phones', name:'טלפונים', icon:'📞', count: LIVE_PHONES.length },
    ...CATEGORIES.map(c => ({
      ...c,
      count: c.id==='transport' ? transportCount : c.id==='onboarding' ? onboardingCount : c.id==='guidelines' ? guidelinesCount : (counts[c.id]||0)
    }))
  ];

  document.getElementById('catsRow').innerHTML = items.map(c => `
    <button class="cat-btn ${c.id===activeCat?'active':''}" data-cat="${c.id}">
      <span>${c.icon}</span><span>${c.name}</span><span class="n">${c.count}</span>
    </button>
  `).join('');

  document.querySelectorAll('.cat-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      activeCat = btn.dataset.cat;
      renderCats();
      renderServices();
    });
  });
}

function renderServices(){
  const date = new Date();
  const eyebrow = document.getElementById('blockEyebrow');
  const titleEl = document.getElementById('blockTitle');
  const container = document.getElementById('servicesGrid');

  // רובריקת קליטה היא נפרדת לגמרי מרשימת השירותים/תחבורה - תצוגה משלה
  if (activeCat === 'onboarding'){
    eyebrow.textContent = 'קליטה';
    titleEl.textContent = 'תהליך הקליטה';
    container.className = 'timeline';
    container.innerHTML = renderTimeline();
    return;
  }

  // רובריקת טלפונים היא גם היא נפרדת - לא מוצגת יחד עם שירותים אחרים
  if (activeCat === 'phones'){
    eyebrow.textContent = 'טלפונים';
    titleEl.textContent = 'טלפונים חשובים — חייגו בלחיצה אחת';
    container.className = 'phones-grid';
    container.innerHTML = renderPhones();
    return;
  }

  // רובריקת דגשים ונהלים - תוכן חופשי מחולק לנושאים מתקפלים
  if (activeCat === 'guidelines'){
    eyebrow.textContent = 'נהלים';
    titleEl.textContent = 'נהלים בבסיס';
    container.className = 'guidelines-list';
    container.innerHTML = renderGuidelines();
    return;
  }

  eyebrow.textContent = activeCat === 'all' ? 'כל השירותים' : CATEGORIES.find(c=>c.id===activeCat).name;
  titleEl.textContent = '';
  container.className = 'grid';

  let html = '';
  LIVE_SERVICES.forEach(s=>{
    if (activeCat === 'all' || activeCat === s.category){
      html += renderServiceCard(s, date);
    }
  });
  if (activeCat === 'all' || activeCat === 'transport'){
    html += renderBusCard(date);
    html += renderShuttlesCard();
    html += renderTransportInfoCard();
  }
  container.innerHTML = html || `<div class="status-line">אין שירותים בקטגוריה זו.</div>`;

  const toggle = document.getElementById('busToggle');
  if (toggle){
    toggle.addEventListener('click', ()=>{
      const full = document.getElementById('busFull');
      full.classList.toggle('show');
      toggle.textContent = full.classList.contains('show') ? 'הסתר לוח זמנים מלא ▴' : 'הצג לוח זמנים מלא ליום זה ▾';
    });
  }
}

// ---------- שעון חי ----------
function tickClock(){
  const now = new Date();
  document.getElementById('clockTime').textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
  document.getElementById('clockDay').textContent = `יום ${DAY_NAMES[now.getDay()]}`;
}

// ---------- חיפוש ----------
function getSearchable(){
  return [
    ...LIVE_SERVICES.map(s => ({ id:s.id, name:s.name, anchor:`svc-${s.id}` })),
    { id:'bus10', name:'קו 10', anchor:'svc-bus10' },
    { id:'shuttles', name:'שאטלים', anchor:'svc-shuttles' },
    { id:'transport-info', name:'קו 392', anchor:'svc-transport-info' },
    { id:'onboarding', name:'קליטה', cat:'onboarding' }, // רובריקה נפרדת - קופצת לקטגוריה, לא לכרטיס
    { id:'phones', name:'טלפונים', cat:'phones' },
    { id:'guidelines', name:'נהלים', cat:'guidelines' },
  ];
}

function renderSearchResults(query){
  const box = document.getElementById('searchResults');
  if (!query.trim()){
    box.classList.remove('show');
    box.innerHTML = '';
    return;
  }
  const matches = getSearchable().filter(item => item.name.includes(query.trim()));
  if (matches.length === 0){
    box.innerHTML = `<div class="empty">לא נמצאה התאמה ל"${query}"</div>`;
  } else {
    box.innerHTML = matches.map(m => `<button data-anchor="${m.anchor||''}" data-cat="${m.cat||''}">🔎 ${m.name}</button>`).join('');
  }
  box.classList.add('show');

  box.querySelectorAll('button').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      if (btn.dataset.cat){ goToCategory(btn.dataset.cat); }
      else { goToService(btn.dataset.anchor); }
      box.classList.remove('show');
      document.getElementById('searchInput').value = '';
    });
  });
}

function goToService(anchorId){
  // ודאו שהקטגוריה הרלוונטית מוצגת
  activeCat = 'all';
  renderCats();
  renderServices();
  requestAnimationFrame(()=>{
    const el = document.getElementById(anchorId);
    if (el){
      el.scrollIntoView({ behavior:'smooth', block:'center' });
      el.classList.add('flash');
      setTimeout(()=> el.classList.remove('flash'), 1700);
    }
  });
}

function goToCategory(catId){
  activeCat = catId;
  renderCats();
  renderServices();
  document.getElementById('servicesBlock').scrollIntoView({ behavior:'smooth', block:'start' });
}

document.getElementById('searchInput').addEventListener('input', e => renderSearchResults(e.target.value));
document.getElementById('searchInput').addEventListener('keydown', e=>{
  if (e.key === 'Enter'){
    const query = e.target.value.trim();
    const match = getSearchable().find(item => item.name.includes(query));
    if (match) {
      if (match.cat) goToCategory(match.cat); else goToService(match.anchor);
      document.getElementById('searchResults').classList.remove('show'); e.target.value='';
    }
  }
});
document.addEventListener('click', e=>{
  if (!e.target.closest('.search-wrap')) document.getElementById('searchResults').classList.remove('show');
});

// ---------- אתחול ----------
async function loadAndRenderData(){
  document.getElementById('servicesGrid').innerHTML = `<div class="status-line">טוען נתונים…</div>`;
  try {
    const remote = await loadRemoteData();
    rebuildLiveData(remote);
    DATA_LOAD_FAILED = false;
    document.getElementById('dataErrorBanner').style.display = 'none';
    renderCats();
    renderServices();
  } catch(e){
    DATA_LOAD_FAILED = true;
    document.getElementById('dataErrorBanner').style.display = 'block';
    document.getElementById('servicesGrid').innerHTML = '';
    document.getElementById('catsRow').innerHTML = '';
  }
}

function init(){
  tickClock();
  setInterval(()=>{
    tickClock();
    if (!DATA_LOAD_FAILED) renderServices(); // מרענן סטטוסים וזמני קו 10 מדי דקה - רק אם יש נתונים תקינים
  }, 30000);

  // פתיחת מודל הווידאו בלחיצה על כל כפתור "צפו בסרטון" (Event delegation - עובד גם עבור כרטיסים שנטענים מחדש)
  document.addEventListener('click', e=>{
    const trigger = e.target.closest('.video-trigger');
    if (trigger) openVideoModal(trigger.dataset.videoKey);
  });
  document.getElementById('videoModalClose').addEventListener('click', closeVideoModal);
  document.getElementById('videoModal').addEventListener('click', e=>{
    if (e.target.id === 'videoModal') closeVideoModal(); // לחיצה על הרקע הכהה סוגרת
  });
  document.addEventListener('keydown', e=>{
    if (e.key === 'Escape') closeVideoModal();
  });
  document.getElementById('dataRetryBtn').addEventListener('click', loadAndRenderData);

  loadAndRenderData();
}

init();
</script>

<button id="chatbot-fab" aria-label="פתח בוט תמיכה" title="שאלו את הבוט">
  💬<span class="badge">?</span>
</button>

    <div class="avatar">🤖</div>
    <div>
      <div class="title">בוט 10</div>
      <div class="subtitle">שעות, טלפונים, שאלות ועוד</div>
    </div>
    <button id="chatbot-close" aria-label="סגור">×</button>
  </div>
  <div id="chatbot-messages" aria-live="polite"></div>
  <div id="chatbot-input-wrap">
    <input id="chatbot-input" type="text" placeholder="שאלו שאלה... (למשל: השקם פתוח?)" autocomplete="off">
    <button id="chatbot-send" aria-label="שלח">➤</button>
  </div>
</div>

<script>
(function(){
  const CATEGORIES = {
    health:{label:'בריאות',icon:'⚕'},
    food:{label:'אוכל',icon:'🍽'},
    logistics:{label:'לוגיסטיקה',icon:'🧰'},
    sport:{label:'ספורט',icon:'🏋'},
    prayers:{label:'תפילות',icon:'🕍'},
    transport:{label:'תחבורה',icon:'🚌'}
  };
  const DAYS = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];

  let DATA = null;
  const fab = document.getElementById('chatbot-fab');
  const panel = document.getElementById('chatbot-panel');
  const closeBtn = document.getElementById('chatbot-close');
  const msgs = document.getElementById('chatbot-messages');
  const input = document.getElementById('chatbot-input');
  const sendBtn = document.getElementById('chatbot-send');

  async function loadData(){
    try{
      const res = await fetch('data.json?_=' + Date.now());
      DATA = await res.json();
    }catch(e){ console.error('Bot: data load failed',e); }
  }

  function addMsg(html, who){
    const d = document.createElement('div');
    d.className = 'cb-msg ' + (who || 'bot');
    d.innerHTML = html;
    msgs.appendChild(d);
    msgs.scrollTop = msgs.scrollHeight;
    return d;
  }
  function addChips(items){
    const wrap = document.createElement('div');
    wrap.className = 'cb-chips';
    items.forEach(it=>{
      const b = document.createElement('button');
      b.className = 'cb-chip' + (it.back?' back':'');
      b.textContent = it.label;
      b.onclick = ()=>{ it.action(); };
      wrap.appendChild(b);
    });
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
  }

  /* ---------- Hours parsing ---------- */
  function parseRanges(str){
    if(!str||!str.trim()) return [];
    return str.split(',').map(s=>s.trim()).filter(Boolean).map(seg=>{
      const label = (seg.match(/\(([^)]+)\)/)||[])[1] || '';
      const clean = seg.replace(/\([^)]*\)/,'').trim();
      const m = clean.match(/(\d{1,2}):(\d{2})\s*-\s*(\d{1,2}):(\d{2})/);
      if(!m) return null;
      return {startMin:+m[1]*60+ +m[2], endMin:+m[3]*60+ +m[4], text:clean, label};
    }).filter(Boolean);
  }
  function isOpenNow(hoursObj){
    const now = new Date();
    const day = now.getDay();
    const minutes = now.getHours()*60 + now.getMinutes();
    const ranges = parseRanges(hoursObj[day]||'');
    return ranges.some(r=>minutes>=r.startMin && minutes<r.endMin);
  }
  function fmtHours(hoursObj){
    return DAYS.map((d,i)=>{
      const raw = hoursObj[i]||'';
      return `<div style="display:flex;gap:8px;padding:2px 0"><span style="min-width:52px;font-weight:600;color:#6B4C7A">${d}:</span><span>${raw||'סגור'}</span></div>`;
    }).join('');
  }

  /* ---------- Views ---------- */
  function greet(){
    msgs.innerHTML = '';
    addMsg('שלום! 👋 אני בוט 10. במה אפשר לעזור?');
    addChips([
      {label:'📋 קטגוריות ושעות',action:showCategories},
      {label:'🚌 קו 10 (הסעות פנימיות)',action:showBusMenu},
      {label:'📞 טלפונים',action:showPhones},
      {label:'🚐 שאטלים לערים',action:showShuttles},
      {label:'📑 נהלים ודגשים',action:showGuidelinesMenu},
      {label:'ℹ️ דוגמאות שאלות',action:showExamples}
    ]);
  }
  function showExamples(){
    addMsg('נסו לשאול לדוגמה:<br>• "השקם פתוח?"<br>• "שעות של המרפאה"<br>• "אני צריך להגיע למגדל ב-19:00"<br>• "טלפון למושלם"<br>• "שאטל מירושלים"<br>• "מה הנוהל לצילום בבסיס?"<br>• "מה עושים בהתרעה?"');
  }
  function showGuidelinesMenu(){
    const g = (DATA.guidelines||[]);
    if(!g.length){ addMsg('אין נהלים זמינים.'); return; }
    addMsg('<b>📑 נהלים ודגשים</b><br>בחרו נושא או שאלו שאלה חופשית (למשל: "האם מותר לצלם?"):');
    const chips = g.map((x,i)=>({label:x.title, action:()=>showGuidelineTopic(i)}));
    chips.push({label:'↩ חזרה',back:true,action:greet});
    addChips(chips);
  }
  function showGuidelineTopic(i){
    const x = (DATA.guidelines||[])[i]; if(!x) return;
    let html = `<b>📑 ${x.title}</b><ul style="margin:6px 18px 0;padding:0;font-size:13px">${x.points.map(p=>`<li style="padding:3px 0">${p}</li>`).join('')}</ul>`;
    addMsg(html);
    addChips([
      {label:'↩ לנהלים',back:true,action:showGuidelinesMenu},
      {label:'🏠 תפריט ראשי',back:true,action:greet}
    ]);
  }
  function showCategories(){
    addMsg('בחרו קטגוריה:');
    const chips = Object.keys(CATEGORIES).map(k=>({
      label: CATEGORIES[k].icon+' '+CATEGORIES[k].label,
      action: ()=>showCategory(k)
    }));
    chips.push({label:'↩ חזרה',back:true,action:greet});
    addChips(chips);
  }
  function showCategory(cat){
    const svcs = Object.entries(DATA.services).filter(([,s])=>s.category===cat);
    if(!svcs.length){ addMsg('אין שירותים בקטגוריה זו.'); return; }
    addMsg('שירותים בקטגוריית '+CATEGORIES[cat].label+':');
    const chips = svcs.map(([k,s])=>({
      label: s.icon+' '+s.name+(isOpenNow(s.hours)?' 🟢':' 🔴'),
      action: ()=>showService(k)
    }));
    chips.push({label:'↩ לקטגוריות',back:true,action:showCategories});
    addChips(chips);
  }
  function showService(key){
    const s = DATA.services[key]; if(!s) return;
    const open = isOpenNow(s.hours);
    const today = DAYS[new Date().getDay()];
    const todayHours = s.hours[new Date().getDay()] || 'סגור';
    let html = `<b>${s.icon} ${s.name}</b> <span class="cb-status ${open?'open':'closed'}">${open?'פתוח כעת':'סגור כעת'}</span>`;
    html += `<div style="margin-top:6px"><b>היום (${today}):</b> ${todayHours||'סגור'}</div>`;
    html += `<div style="margin-top:8px;padding-top:6px;border-top:1px dashed #EED2B8"><b>שעות שבועיות:</b><div style="font-size:13px;margin-top:4px">${fmtHours(s.hours)}</div></div>`;
    if(s.note) html += `<div style="margin-top:8px;padding:6px 8px;background:#FBF3E7;border-radius:8px;font-size:13px">${s.note}</div>`;
    addMsg(html);
    addChips([
      {label:'↩ לקטגוריה',back:true,action:()=>showCategory(s.category)},
      {label:'🏠 תפריט ראשי',back:true,action:greet}
    ]);
  }
  function showPhones(){
    let html = '<b>📞 טלפונים חשובים:</b><div style="margin-top:6px;font-size:13px">';
    DATA.phones.forEach(p=>{
      html += `<div style="padding:4px 0;border-bottom:1px dashed #EED2B8"><b>${p.name}</b> — ${p.role}<br><a href="tel:${p.number.replace(/[^0-9]/g,'')}" style="color:#D9603D;font-weight:700">${p.number}</a></div>`;
    });
    html += '</div>';
    addMsg(html);
    addChips([{label:'↩ חזרה',back:true,action:greet}]);
  }
  function showShuttles(){
    let html = '<b>🚐 שאטלים לבסיס:</b><div style="margin-top:6px;font-size:13px">';
    DATA.shuttles.forEach(s=>{
      html += `<div style="padding:4px 0;border-bottom:1px dashed #EED2B8"><b>${s.route}</b><br><span style="color:#6B4C7A">${s.days}</span> — <a href="${s.whatsapp}" target="_blank" style="color:#D9603D">קבוצת וואטסאפ</a></div>`;
    });
    html += '</div>';
    addMsg(html);
    addChips([{label:'↩ חזרה',back:true,action:greet}]);
  }
  function showBusMenu(){
    addMsg('<b>🚌 קו 10 — הסעות פנימיות</b><br>המסלולים יוצאים מרחבת ההיסעים בכל שעה עגולה בדקות שונות:');
    let html = '<div style="font-size:13px">';
    DATA.busRoutes.forEach(r=>{
      html += `<div style="padding:6px 0;border-bottom:1px dashed #EED2B8"><b>${r.name}</b> — יוצא בכל שעה בדקה ${String(r.minuteOffset).padStart(2,'0')}<br><span style="color:#6B4C7A;font-size:12px">${r.stops}</span></div>`;
    });
    const bh = DATA.busHours;
    html += `<div style="margin-top:6px;padding:6px;background:#FBF3E7;border-radius:8px">שעות פעילות: ${bh.firstHour}:00 עד ${bh.lastHourNormal}:00 (חמישי עד ${bh.lastHourThursday}:00)</div>`;
    html += '</div>';
    addMsg(html);
    addChips([
      {label:'⏰ חשב זמן הגעה ליעד',action:askDestination},
      {label:'↩ חזרה',back:true,action:greet}
    ]);
  }
  function askDestination(){
    addMsg('כתבו: "אני צריך להגיע ל<b>[יעד]</b> ב<b>[שעה]</b>" — למשל: <i>אני צריך להגיע למגדל ב-19:00</i>');
  }

  /* ---------- Q&A ---------- */
  function findService(text){
    const t = text.replace(/["']/g,'');
    for(const [k,s] of Object.entries(DATA.services)){
      const names = [s.name, s.name.replace(/"/g,''), k];
      if(names.some(n=>t.includes(n))) return [k,s];
    }
    // aliases
    const aliases = {'שקם':'shekem','שק"ם':'shekem','חדר אוכל':'mess-hall','מרפאה':'clinic','שיניים':'dental','כושר':'gym','אפסנאות':'quartermaster','נשקייה':'armory','נשקיה':'armory','בית כנסת':'synagogue','בשריה':'meat-kitchen','בשרייה':'meat-kitchen','חלביה':'dairy-kitchen','חלבייה':'dairy-kitchen','בריכה':'pool','פסיכולוג':'mental-health'};
    for(const [a,k] of Object.entries(aliases)){
      if(t.includes(a) && DATA.services[k]) return [k,DATA.services[k]];
    }
    return null;
  }
  function extractTime(text){
    const m = text.match(/(\d{1,2}):(\d{2})/) || text.match(/ב[־\-\s]*(\d{1,2})(?![\d:])/);
    if(!m) return null;
    const h = +m[1]; const mm = m[2]?+m[2]:0;
    if(h>=0&&h<=23&&mm>=0&&mm<=59) return h*60+mm;
    return null;
  }
  function findBusRoutesForStop(stopText){
    const t = stopText;
    return DATA.busRoutes.filter(r=>{
      return r.stops.split('←').some(s=>s.trim().includes(t));
    }).map(r=>{
      const stops = r.stops.split('←').map(s=>s.trim());
      const idx = stops.findIndex(s=>s.includes(t));
      return {route:r, stopIndex:idx, totalStops:stops.length, stopName:stops[idx]};
    });
  }
  function answerBusQuestion(text){
    // detect destination keywords
    const destKeywords = ['מגדל','מרפאה','מושל"ם','מושלם','ש"ג','בינוי','מנהלה','טירונות','תובלות','ביסמ"ת','ביסמת','תקשוב','הגנ"א','ברוש','גף רכב','כיבוי'];
    let dest = null;
    for(const k of destKeywords){ if(text.includes(k.replace(/"/g,''))||text.includes(k)){ dest = k; break; } }
    if(!dest) return false;
    const targetMin = extractTime(text);
    const matches = findBusRoutesForStop(dest);
    if(!matches.length){ addMsg('לא מצאתי מסלול פנימי שעובר ב<b>'+dest+'</b>. נסו לבדוק בתפריט קו 10.'); return true; }

    // estimated travel: ~2 min per stop from רחבת היסעים
    let html = `<b>🚌 יעד: ${dest}</b>`;
    if(targetMin!=null){
      const th = Math.floor(targetMin/60), tm = targetMin%60;
      html += `<br>יעד הגעה: ${String(th).padStart(2,'0')}:${String(tm).padStart(2,'0')}<br><br>`;
      matches.forEach(m=>{
        const travel = m.stopIndex * 2; // approx 2 דקות לתחנה
        // find latest hour where hour*60 + offset + travel <= target
        const bh = DATA.busHours;
        const lastHour = new Date().getDay()===4 ? bh.lastHourThursday : bh.lastHourNormal;
        let bestHour = null;
        for(let h=bh.firstHour; h<=lastHour; h++){
          const depart = h*60 + m.route.minuteOffset;
          const arrive = depart + travel;
          if(arrive <= targetMin) bestHour = h;
        }
        html += `<div style="padding:6px 0;border-bottom:1px dashed #EED2B8"><b>${m.route.name}</b> (דקה ${String(m.route.minuteOffset).padStart(2,'0')})<br>`;
        if(bestHour!=null){
          const dep = bestHour*60 + m.route.minuteOffset;
          const arr = dep + travel;
          html += `להתייצב ברחבת ההיסעים לא יאוחר מ-<b style="color:#D9603D">${String(bestHour).padStart(2,'0')}:${String(m.route.minuteOffset).padStart(2,'0')}</b><br><span style="font-size:12px;color:#6B4C7A">הגעה משוערת ל${dest}: ${String(Math.floor(arr/60)).padStart(2,'0')}:${String(arr%60).padStart(2,'0')} (~${travel} דק' נסיעה)</span>`;
        } else {
          html += `<span style="color:#A23B2E">אין נסיעה מתאימה בשעות הפעילות</span>`;
        }
        html += '</div>';
      });
      html += `<div style="margin-top:6px;font-size:12px;color:#6E5B60">* זמן הנסיעה מוערך (~2 דק' לתחנה). מומלץ להגיע 5 דק' מוקדם.</div>`;
    } else {
      html += `<br>מסלולים שעוברים ב${dest}:<br>`;
      matches.forEach(m=>{
        html += `<div style="padding:4px 0">• <b>${m.route.name}</b> — יוצא בכל שעה בדקה ${String(m.route.minuteOffset).padStart(2,'0')}, מגיע כתחנה ${m.stopIndex+1} מתוך ${m.totalStops}</div>`;
      });
      html += '<br>ציינו שעת יעד כדי לחשב מתי להתייצב.';
    }
    addMsg(html);
    return true;
  }
  function answerPhone(text){
    if(!/טלפון|מספר|התקשר/.test(text)) return false;
    const results = DATA.phones.filter(p=>text.includes(p.name.replace(/"/g,''))||text.includes(p.name));
    const list = results.length?results:DATA.phones.filter(p=>text.split(/\s+/).some(w=>w.length>2&&p.name.includes(w)));
    if(!list.length){ showPhones(); return true; }
    let html = '<b>📞 מצאתי:</b><div style="margin-top:4px;font-size:13px">';
    list.forEach(p=>{ html+=`<div style="padding:4px 0"><b>${p.name}</b> — ${p.role}<br><a href="tel:${p.number.replace(/[^0-9]/g,'')}" style="color:#D9603D;font-weight:700">${p.number}</a></div>`;});
    html += '</div>';
    addMsg(html);
    return true;
  }
  // Extract every city token that appears in the shuttle routes (split by ← and cleanup)
  function shuttleCities(){
    const set = new Set();
    (DATA.shuttles||[]).forEach(s=>{
      s.route.split(/[←,\/]|->/).forEach(part=>{
        const c = part.trim();
        if(c.length>=2) set.add(c);
      });
    });
    return [...set];
  }
  const DAY_WORDS = {
    'ראשון':'ראשון','שני':'שני','שלישי':'שלישי','רביעי':'רביעי',
    'חמישי':'חמישי','שישי':'שישי','שבת':'שבת'
  };
  function answerShuttle(text){
    const hasKeyword = /שאטל|הסעה|הסעות|הביתה|בייתה|לבית|גר ב|גרה ב|איך.*(בייתה|הביתה|לבית|לצאת|מגיע)/.test(text);
    const cities = shuttleCities();
    const matchedCities = cities.filter(c=>text.includes(c));
    if(!hasKeyword && !matchedCities.length) return false;

    const dayMatch = Object.keys(DAY_WORDS).find(d=>text.includes(d));
    let list = DATA.shuttles;
    if(matchedCities.length) list = list.filter(s=>matchedCities.some(c=>s.route.includes(c)));
    if(dayMatch) list = list.filter(s=>s.days.includes(dayMatch)) ;

    if(!list.length){
      let msg = '<b>🚐 שאטלים</b><br><span style="color:#A23B2E">לא מצאתי שאטל מתאים';
      if(matchedCities.length) msg += ` ל${matchedCities.join('/')}`;
      if(dayMatch) msg += ` ביום ${dayMatch}`;
      msg += '</span><br><span style="font-size:12px;color:#6B4C7A">השאטלים פעילים בימי ראשון וחמישי בלבד. חלופה: קו 392 מהבסיס.</span>';
      addMsg(msg);
      return true;
    }

    let html = '<b>🚐 שאטלים';
    if(matchedCities.length) html += ` ל${matchedCities.join('/')}`;
    if(dayMatch) html += ` — יום ${dayMatch}`;
    html += ':</b><div style="margin-top:4px;font-size:13px">';
    list.forEach(s=>{ html+=`<div style="padding:6px 0;border-bottom:1px dashed #EED2B8"><b>${s.route}</b><br>ימים: ${s.days}<br><a href="${s.whatsapp}" target="_blank" style="color:#D9603D;font-weight:700">הצטרפו לקבוצת הוואטסאפ ←</a></div>`;});
    html += '</div>';
    if(DATA.shuttleApps){
      html += `<div style="margin-top:6px;font-size:12px;color:#6B4C7A">להזמנת מקום השתמשו באפליקציית "שאט-ל": <a href="${DATA.shuttleApps.googlePlayUrl}" target="_blank" style="color:#D9603D">Android</a> · <a href="${DATA.shuttleApps.appStoreUrl}" target="_blank" style="color:#D9603D">iPhone</a></div>`;
    }
    addMsg(html);
    return true;
  }
  function answerTransport392(text){
    if(!/392|אגד|תחבורה ציבורית|אוטובוס ציבורי/.test(text)) return false;
    const t = DATA.transportInfo; if(!t) return false;
    let html = `<b>🚌 ${t.title}</b><div style="margin-top:4px;font-size:13px">${(t.body||[]).join('<br>')}</div>`;
    if(t.linkUrl) html += `<div style="margin-top:6px"><a href="${t.linkUrl}" target="_blank" style="color:#D9603D;font-weight:700">${t.linkLabel||'הזמנת כרטיס'} ←</a></div>`;
    addMsg(html);
    return true;
  }
  function answerGuidelines(text){
    const g = DATA.guidelines||[]; if(!g.length) return false;
    const TRIGGERS = /נוהל|נהלי|נהלים|הנחיה|הנחיות|דגש|דגשים|בטיחות|אבטחת מידע|אבטחה|ספיגה|התרעה|אזעקה|צילום|לצלם|מותר|אסור|מרחב מוגן|ממ"?ד|ממ"?ק|חגור|חגורה|נשק|מסלול|מסלולים|מפגע|תקלה|מסמך|רגיש|כספת|רמזור|מחסום|מגדל.*מסלול|טיסה/;
    // stopwords to ignore when scoring
    const STOP = new Set(['של','על','את','לא','כן','זה','זאת','אני','אתה','אתם','מה','איך','מתי','למה','כמה','יש','אין','גם','אם','או','כי','עם','ללא','אפשר','צריך','חייב','חובה','בבסיס','בסיס']);
    const words = text.replace(/[.,?!"'()]/g,' ').split(/\s+/).filter(w=>w.length>2 && !STOP.has(w));
    const scored = g.map(x=>{
      let score = 0;
      if(text.includes(x.title)) score += 5;
      for(const w of words){
        if(x.title.includes(w)) score += 3;
        for(const p of x.points){ if(p.includes(w)) score += 1; }
      }
      return {x, score};
    });
    const hasTrigger = TRIGGERS.test(text);
    const best = scored.filter(s=>s.score>0).sort((a,b)=>b.score-a.score);
    if(!hasTrigger && !best.length) return false;
    const list = best.length ? best.slice(0,2).map(s=>s.x) : g;
    let html = '<b>📑 דגשים ונהלים:</b>';
    list.forEach(x=>{
      html += `<div style="margin-top:8px"><b>${x.title}</b><ul style="margin:4px 18px 0;padding:0;font-size:13px">${x.points.map(p=>`<li style="padding:2px 0">${p}</li>`).join('')}</ul></div>`;
    });
    if(best.length && best.length < g.length){
      html += `<div style="margin-top:8px;font-size:12px;color:#6B4C7A">רוצים לראות את כל הנהלים? הקלידו "נהלים" או בחרו מהתפריט.</div>`;
    }
    addMsg(html);
    return true;
  }
  function processQuestion(q){
    const text = q.trim();
    if(!text) return;
    addMsg(text,'user');
    if(!DATA){ addMsg('רגע, טוען נתונים...'); return; }

    // greetings
    if(/^(שלום|היי|hello|hi)/i.test(text)){ addMsg('שלום! 👋'); return greet(); }
    if(/תפריט|עזרה|תודה/.test(text)){ return greet(); }

    // shuttles (city + day + "home") — check BEFORE service lookup so "מודיעין" doesn't match a service
    if(answerShuttle(text)) return;
    // 392 / public transport
    if(answerTransport392(text)) return;
    // bus / destination
    if(/מגדל|רחבת|היסעים|קו 10|להגיע ל|להתייצב/.test(text)){
      if(answerBusQuestion(text)) return;
    }
    // phones
    if(answerPhone(text)) return;
    // guidelines
    if(answerGuidelines(text)) return;
    // service lookup
    const svc = findService(text);
    if(svc){
      const [k,s] = svc;
      if(/פתוח|שעות|מתי|עד מתי|סגור/.test(text)||true){
        showService(k);
        return;
      }
    }
    // fallback
    addMsg('לא הבנתי במדויק, נסו לבחור מהתפריט:');
    addChips([
      {label:'📋 קטגוריות',action:showCategories},
      {label:'🚌 קו 10',action:showBusMenu},
      {label:'📞 טלפונים',action:showPhones},
      {label:'🚐 שאטלים',action:showShuttles}
    ]);
  }

  /* ---------- Events ---------- */
  fab.addEventListener('click', async ()=>{
    panel.classList.toggle('open');
    if(panel.classList.contains('open')){
      if(!DATA){ await loadData(); }
      if(!msgs.children.length) greet();
      setTimeout(()=>input.focus(),100);
    }
  });
  closeBtn.addEventListener('click',()=>panel.classList.remove('open'));
  sendBtn.addEventListener('click',()=>{ const v=input.value; input.value=''; processQuestion(v); });
  input.addEventListener('keydown',e=>{ if(e.key==='Enter'){ const v=input.value; input.value=''; processQuestion(v); }});

  loadData();
})();
</script>
